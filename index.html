<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heinford Wasath Udanaya 2026</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Reset & base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background: #f0f4f8; color: #333; }

    /* Center form */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Card style */
    form {
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
      transition: transform 0.2s ease;
    }
    form:hover { transform: translateY(-5px); }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #4CAF50;
      font-weight: 700;
    }

    /* Inputs & selects */
    input, select {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: #4CAF50;
      outline: none;
    }

    /* File input */
    input[type="file"] {
      padding: 5px;
    }

    /* Button */
    button {
      width: 100%;
      padding: 14px;
      background: #4CAF50;
      border: none;
      color: white;
      font-size: 18px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover {
      background: #45a049;
      transform: translateY(-2px);
    }

    /* Responsive small text */
    @media (max-width: 500px) {
      form { padding: 20px 15px; }
      button { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  <form id="myForm">
    <h2>Heinford Wasath Udanaya 2026</h2>

    <input type="text" placeholder="Name" id="name" required>

    <select id="department" required>
      <option value="">Select Department</option>
      <option>Management</option>
      <option>Information Technology</option>
      <option>Tourism & Hospitality Management</option>
      <option>Business Finance</option>
      <option>English</option>
    </select>

    <input type="text" placeholder="Register No" id="regno" required>

    <input type="date" id="date" required>

    <input type="number" id="amount" value="500.00" step="0.01">

    <select id="status" required>
      <option value="">Select Paid Status</option>
      <option>Hand Over</option>
      <option>Online Transfer</option>
      <option>Bank Deposit</option>
    </select>

    <input type="file" id="slip" accept="image/*">

    <button type="submit">Submit</button>
  </form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyH7-DHzFTsY-iRDDkjRgJ5K6bSsArz8aiR5AdkStvKEDsFJCVhPGLqGpO6SwAktLUIDw/exec";

document.getElementById("myForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const fileInput = document.getElementById("slip");
  let base64 = "";

  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    base64 = await toBase64(file);
    base64 = base64.split(",")[1]; // remove metadata
  }

  const data = {
    name: document.getElementById("name").value,
    department: document.getElementById("department").value,
    regno: document.getElementById("regno").value,
    date: document.getElementById("date").value,
    amount: document.getElementById("amount").value,
    status: document.getElementById("status").value,
    slip: base64
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => alert("Submitted Successfully!"))
  .catch(err => alert("Error submitting form"));
});

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}
</script>

</body>
</html>
