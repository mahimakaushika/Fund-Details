<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heinford Wasath Udanaya 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #ec4899;
  --accent: #06b6d4;
  --bg-dark: #0f172a;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.15);
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
  min-height: 100vh;
  color: var(--text-primary);
  overflow-x: hidden;
  position: relative;
}

/* Animated Background Particles */
.bg-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -1;
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
  animation: float 20s infinite ease-in-out;
}

.particle:nth-child(1) { width: 400px; height: 400px; top: -200px; left: -200px; animation-delay: 0s; }
.particle:nth-child(2) { width: 300px; height: 300px; top: 50%; right: -150px; animation-delay: 5s; }
.particle:nth-child(3) { width: 250px; height: 250px; bottom: -100px; left: 30%; animation-delay: 10s; }
.particle:nth-child(4) { width: 350px; height: 350px; top: 20%; left: 60%; animation-delay: 15s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -50px) scale(1.1); }
  50% { transform: translate(-30px, 30px) scale(0.9); }
  75% { transform: translate(30px, 50px) scale(1.05); }
}

/* Container */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
}

/* Glass Form */
form {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px 35px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

form::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
  animation: shimmer 3s infinite linear;
}

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes slideUp {
  from { 
    opacity: 0; 
    transform: translateY(40px) scale(0.95); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1); 
  }
}

/* Logo/Image */
.image {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 30px;
  animation: fadeIn 0.6s ease-out 0.3s backwards;
}

form img {
  width: 180px;
  filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
  transition: transform 0.3s ease;
}

form img:hover {
  transform: scale(1.05);
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* Form Title */
.form-title {
  text-align: center;
  margin-bottom: 30px;
  animation: fadeIn 0.6s ease-out 0.4s backwards;
}

.form-title h1 {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.form-title p {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* Input Groups with Floating Labels */
.input-group {
  position: relative;
  margin-bottom: 20px;
  animation: fadeInUp 0.5s ease-out backwards;
}

.input-group:nth-child(3) { animation-delay: 0.5s; }
.input-group:nth-child(4) { animation-delay: 0.55s; }
.input-group:nth-child(5) { animation-delay: 0.6s; }
.input-group:nth-child(6) { animation-delay: 0.65s; }
.input-group:nth-child(7) { animation-delay: 0.7s; }
.input-group:nth-child(8) { animation-delay: 0.75s; }
.input-group:nth-child(9) { animation-delay: 0.8s; }

@keyframes fadeInUp {
  from { 
    opacity: 0; 
    transform: translateY(20px); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0); 
  }
}

.input-group input,
.input-group select {
  width: 100%;
  padding: 16px 16px 16px 48px;
  border-radius: 12px;
  border: 1px solid rgba(99, 102, 241, 0.2);
  background: rgba(15, 23, 42, 0.6);
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: 'Inter', sans-serif;
  transition: all 0.3s ease;
  outline: none;
}

.input-group input:focus,
.input-group select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
  background: rgba(15, 23, 42, 0.8);
}

.input-group label {
  position: absolute;
  left: 48px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 0.95rem;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  background: transparent;
  padding: 0 4px;
}

/* Floating Label Animation */
.input-group input:focus ~ label,
.input-group input:not(:placeholder-shown) ~ label,
.input-group select:focus ~ label,
.input-group select:valid ~ label {
  top: 0;
  left: 16px;
  font-size: 0.75rem;
  color: var(--primary);
  background: linear-gradient(180deg, rgba(30, 41, 59, 0.9) 0%, rgba(30, 41, 59, 1) 100%);
  padding: 0 8px;
  font-weight: 500;
}

/* Icons */
.input-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  transition: all 0.3s ease;
  pointer-events: none;
}

.input-group input:focus ~ .input-icon,
.input-group select:focus ~ .input-icon {
  color: var(--primary);
}

/* File Input Special Styling */
.file-input {
  position: relative;
  overflow: hidden;
  display: inline-block;
  width: 100%;
}

.file-input input[type="file"] {
  position: absolute;
  left: -9999px;
}

.file-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: 2px dashed rgba(99, 102, 241, 0.3);
  background: rgba(15, 23, 42, 0.4);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 0.95rem;
}

.file-label:hover {
  border-color: var(--primary);
  background: rgba(99, 102, 241, 0.1);
  color: var(--text-primary);
}

.file-label.has-file {
  border-color: var(--success);
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
}

/* Submit Button */
button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border: none;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
  animation: fadeInUp 0.5s ease-out 0.85s backwards;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

button::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
}

button:active {
  transform: translateY(0);
}

button:active::before {
  width: 300px;
  height: 300px;
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

/* Loading Spinner */
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Success message */
#successMsg {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
  color: white;
  padding: 16px 28px;
  border-radius: 12px;
  opacity: 0;
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

#successMsg.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Decorative Elements */
.decorative-circle {
  position: absolute;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  opacity: 0.1;
  filter: blur(40px);
  z-index: -1;
}

.circle-1 {
  width: 300px;
  height: 300px;
  top: 10%;
  left: -150px;
  animation: pulse 4s infinite;
}

.circle-2 {
  width: 200px;
  height: 200px;
  bottom: 10%;
  right: -100px;
  animation: pulse 4s infinite 2s;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.1; }
  50% { transform: scale(1.2); opacity: 0.15; }
}

/* Responsive */
@media (max-width: 480px) {
  form {
    padding: 30px 20px;
    margin: 10px;
  }
  
  form img {
    width: 150px;
  }
  
  .form-title h1 {
    font-size: 1.25rem;
  }
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 4px;
}
</style>
</head>

<body>

<!-- Background Animation -->
<div class="bg-animation">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- Decorative Circles -->
<div class="decorative-circle circle-1"></div>
<div class="decorative-circle circle-2"></div>

<div class="container">
<form id="myForm">
  <div class="image">
      <img src="Picsart_26-03-24_01-39-29-949.png" alt="Logo">
  </div>

  <div class="form-title">
    <h1>Heinford Wasath Udanaya 2026</h1>
    <p>Registration & Payment Portal</p>
  </div>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
    </svg>
    <input type="text" id="name" placeholder=" " required>
    <label for="name">Full Name</label>
  </div>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
    </svg>
    <select id="department" required>
      <option value="" disabled selected></option>
      <option>Management</option>
      <option>Information Technology</option>
      <option>Tourism & Hospitality Management</option>
      <option>Business Finance</option>
      <option>English</option>
    </select>
    <label for="department">Select Department</label>
  </div>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/>
    </svg>
    <input type="text" id="regno" placeholder=" " required>
    <label for="regno">Registration Number</label>
  </div>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
    </svg>
    <input type="date" id="date" placeholder=" " required>
    <label for="date">Payment Date</label>
  </div>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <input type="number" id="amount" value="500.00" step="0.01" placeholder=" ">
    <label for="amount">Amount (Rs)</label>
  </div>

  <div class="input-group">
    <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <select id="status" required>
      <option value="" disabled selected></option>
      <option>Hand Over</option>
      <option>Online Transfer</option>
      <option>Bank Deposit</option>
    </select>
    <label for="status">Payment Method</label>
  </div>

  <div class="input-group">
    <div class="file-input">
      <input type="file" id="slip" accept="image/*">
      <label for="slip" class="file-label" id="fileLabel">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span id="fileText">Upload Payment Slip (Optional)</span>
      </label>
    </div>
  </div>

  <button type="submit" id="submitBtn">
    <span>Submit Payment</span>
    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
    </svg>
  </button>
</form>

<div id="successMsg">
  <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
  </svg>
  <span>Submitted Successfully!</span>
</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyH7-DHzFTsY-iRDDkjRgJ5K6bSsArz8aiR5AdkStvKEDsFJCVhPGLqGpO6SwAktLUIDw/exec";

// Convert image to base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// File input handler
document.getElementById("slip").addEventListener("change", function(e) {
  const fileLabel = document.getElementById("fileLabel");
  const fileText = document.getElementById("fileText");
  
  if (this.files.length > 0) {
    fileLabel.classList.add("has-file");
    fileText.textContent = this.files[0].name;
  } else {
    fileLabel.classList.remove("has-file");
    fileText.textContent = "Upload Payment Slip (Optional)";
  }
});

// Auto-fill Register No
document.getElementById("department").addEventListener("change", function() {
  const dept = this.value;
  const regInput = document.getElementById("regno");

  const prefixes = {
    "Information Technology": "NAW/IT/2025/F/",
    "Management": "NAW/MG/2025/F/",
    "Tourism & Hospitality Management": "NAW/THM/2025/F/",
    "Business Finance": "NAW/BF/2025/F/",
    "English": "NAW/ENG/2025/F/"
  };

  regInput.value = prefixes[dept] || "";
  regInput.focus();
});

// Form Submit
document.getElementById("myForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  
  const submitBtn = document.getElementById("submitBtn");
  const originalBtnContent = submitBtn.innerHTML;
  
  // Show loading state
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';

  const fileInput = document.getElementById("slip");
  let base64 = "";

  if (fileInput.files.length > 0) {
    try {
      const file = fileInput.files[0];
      base64 = await toBase64(file);
      base64 = base64.split(",")[1];
    } catch (err) {
      console.error("File conversion error:", err);
    }
  }

  const data = {
    name: document.getElementById("name").value,
    department: document.getElementById("department").value,
    regno: document.getElementById("regno").value,
    date: document.getElementById("date").value,
    amount: document.getElementById("amount").value,
    status: document.getElementById("status").value,
    slip: base64
  };

  try {
    await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    // Show success animation
    const msg = document.getElementById("successMsg");
    msg.classList.add("show");

    // Reset form
    document.getElementById("myForm").reset();
    document.getElementById("amount").value = "500.00";
    document.getElementById("fileLabel").classList.remove("has-file");
    document.getElementById("fileText").textContent = "Upload Payment Slip (Optional)";

    setTimeout(() => {
      msg.classList.remove("show");
    }, 3000);

  } catch (err) {
    console.error(err);
    alert("Error submitting form. Please try again.");
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalBtnContent;
  }
});
</script>

</body>
</html>
