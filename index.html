<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heinford Wasath Udanaya 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', sans-serif;
  background: url("IMG_20260323_175800.png") no-repeat center;
  background-size: cover;
  color: #333;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

form {
  background: #ffffff;
  padding: 30px 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 450px;
  margin-top: 100px;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #4CAF50;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background: #4CAF50;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}

/* Success message */
#successMsg {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #4CAF50;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  opacity: 0;
  transition: all 0.4s ease;
}

#successMsg.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div id="formContainer">
	<div id="maintenanceMsg" style="display:none; text-align:center; font-size:22px; color:red; margin-top:50px;">
🚧 Site is under maintenance
	</div>
</div>

<div class="container">
<form id="myForm">
  <h2>Heinford Wasath Udanaya 2026</h2>

  <input type="text" id="name" placeholder="Name" required>

  <select id="department" required>
    <option value="">Select Department</option>
    <option>Management</option>
    <option>Information Technology</option>
    <option>Tourism & Hospitality Management</option>
    <option>Business Finance</option>
    <option>English</option>
  </select>

  <input type="text" id="regno" placeholder="Register No" required>

  <input type="date" id="date" required>

  <input type="number" id="amount" value="500.00" step="0.01">

  <select id="status" required>
    <option value="">Select Paid Status</option>
    <option>Hand Over</option>
    <option>Online Transfer</option>
    <option>Bank Deposit</option>
  </select>

  <input type="file" id="slip" accept="image/*">

  <button type="submit">Submit</button>
</form>

<div id="successMsg">✅ Submitted Successfully!</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyH7-DHzFTsY-iRDDkjRgJ5K6bSsArz8aiR5AdkStvKEDsFJCVhPGLqGpO6SwAktLUIDw/exec";

// Convert image to base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// Auto-fill Register No
document.getElementById("department").addEventListener("change", function() {
  const dept = this.value;
  const regInput = document.getElementById("regno");

  if (dept === "Information Technology") {
    regInput.value = "NAW/IT/2025/F/";
  } else if (dept === "Management") {
    regInput.value = "NAW/MG/2025/F/";
  } else if (dept === "Tourism & Hospitality Management") {
    regInput.value = "NAW/THM/2025/F/";
  } else if (dept === "Business Finance") {
    regInput.value = "NAW/BF/2025/F/";
  } else if (dept === "English") {
    regInput.value = "NAW/ENG/2025/F/";
  } else {
    regInput.value = "";
  }
});

// Form Submit
document.getElementById("myForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const fileInput = document.getElementById("slip");
  let base64 = "";

  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    base64 = await toBase64(file);
    base64 = base64.split(",")[1];
  }

  const data = {
    name: document.getElementById("name").value,
    department: document.getElementById("department").value,
    regno: document.getElementById("regno").value,
    date: document.getElementById("date").value,
    amount: document.getElementById("amount").value,
    status: document.getElementById("status").value,
    slip: base64
  };

  try {
    await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    // Show success animation
    const msg = document.getElementById("successMsg");
    msg.classList.add("show");

    setTimeout(() => {
      msg.classList.remove("show");
    }, 3000);

    // Reset form
    document.getElementById("myForm").reset();
    document.getElementById("amount").value = "500.00";

  } catch (err) {
    console.error(err);
  }
});
async function checkSiteStatus(){
  try{
    const res = await fetch(scriptURL + "?type=status");
    const data = await res.json();

    if(data.status === "OFF"){
      document.getElementById("formContainer").style.display = "none";
      document.getElementById("maintenanceMsg").style.display = "block";
    }
  }catch(e){
    console.error(e);
  }
}

checkSiteStatus();
</script>

</body>
</html>
