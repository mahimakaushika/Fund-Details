<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Heinford Wasath Udanaya 2026</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: url("1774252483604.png") no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 20px;
    color: #333;
  }

  h2 {
    text-align: center;
    color: #4CAF50;
    margin-bottom: 20px;
    font-weight: 700;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
    justify-content: center;
  }

  .filters input, .filters select {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  .table-container {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }

  th, td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #e0e0e0;
  }

  th {
    background: #4CAF50;
    color: white;
    font-weight: 500;
  }

  tr:hover {
    background: #f1f8f4;
  }

  img {
    max-width: 80px;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  img:hover {
    transform: scale(1.1);
  }

  @media(max-width: 600px) {
    th, td { padding: 10px; }
    img { max-width: 60px; }
  }
</style>
</head>
<body>

<h2>Admin Dashboard - Heinford Wasath Udanaya 2026</h2>

<div class="filters">
  <input type="text" id="searchName" placeholder="Search by Name">
  <select id="searchDepartment">
    <option value="">All Departments</option>
    <option>Management</option>
    <option>Information Technology</option>
    <option>Tourism & Hospitality Management</option>
    <option>Business Finance</option>
    <option>English</option>
  </select>
  <select id="searchStatus">
    <option value="">All Status</option>
    <option>Hand Over</option>
    <option>Online Transfer</option>
    <option>Bank Deposit</option>
  </select>
</div>

<div class="table-container">
  <table id="dashboard">
    <thead>
      <tr>
        <th>Name</th>
        <th>Department</th>
        <th>Register No</th>
        <th>Date</th>
        <th>Amount</th>
        <th>Paid Status</th>
        <th>Slip</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const webAppURL = "https://script.google.com/macros/s/AKfycbyH7-DHzFTsY-iRDDkjRgJ5K6bSsArz8aiR5AdkStvKEDsFJCVhPGLqGpO6SwAktLUIDw/exec"; // replace with your Web App URL

let allData = []; // store all submissions

// Fetch data from Google Sheet
async function fetchData() {
  try {
    const res = await fetch(webAppURL);
    const data = await res.json();
    allData = data;
    renderTable();
  } catch(err) {
    console.error("Error fetching data", err);
  }
}

// Render table with optional filters
function renderTable() {
  const tbody = document.querySelector("#dashboard tbody");
  tbody.innerHTML = '';

  const nameFilter = document.getElementById("searchName").value.toLowerCase();
  const deptFilter = document.getElementById("searchDepartment").value;
  const statusFilter = document.getElementById("searchStatus").value;

  allData
    .filter(row => {
      return (row.name.toLowerCase().includes(nameFilter)) &&
             (deptFilter === "" || row.department === deptFilter) &&
             (statusFilter === "" || row.status === statusFilter);
    })
    .forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.name}</td>
        <td>${row.department}</td>
        <td>${row.regno}</td>
        <td>${row.date}</td>
        <td>${row.amount}</td>
        <td>${row.status}</td>
        <td>${row.slip ? `<a href="${row.slip}" target="_blank"><img src="${row.slip}"></a>` : ''}</td>
      `;
      tbody.appendChild(tr);
    });
}

// Filter event listeners
document.getElementById("searchName").addEventListener("input", renderTable);
document.getElementById("searchDepartment").addEventListener("change", renderTable);
document.getElementById("searchStatus").addEventListener("change", renderTable);

// Refresh table every 5 seconds
setInterval(fetchData, 5000);

// Initial fetch
fetchData();
</script>

</body>
</html>
