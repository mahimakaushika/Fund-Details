<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin - Heinford Wasath Udanaya 2026</title>
<style>
body {
  font-family: 'Roboto', sans-serif;
  margin: 0;
  padding: 20px;
  color: #333;
  background: url('1774252483604.png') no-repeat center fixed;
  background-size: cover;
}

h2 { text-align: center; color: #4CAF50; margin-bottom: 20px; }
.total-amount { text-align:center; font-size: 1.2em; margin-bottom:10px; color:#333; }

.table-container {
  position: relative;
  overflow-x:auto;
  background: rgba(255,255,255,0.9); /* semi-transparent for readability */
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

table { width:100%; border-collapse: collapse; }
th, td { padding:12px; text-align:left; border-bottom:1px solid #ccc; }
th { background:#4CAF50; color:white; }
tr:hover { background:#f1f8f4; }
button.delete-btn { background:red; color:white; border:none; padding:6px 10px; border-radius:5px; cursor:pointer; }
button.delete-btn:hover { background:#b30000; }
img { max-width:80px; border-radius:6px; cursor:pointer; }
@media(max-width:600px){ th, td{padding:8px;} img{max-width:60px;} }
</style>
</head>
<body>

<h2>Super Admin - Heinford Wasath Udanaya 2026</h2>
<div class="total-amount">Total Collected: Rs <span id="totalAmount">0</span></div>

<div class="table-container">
  <table id="adminTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Department</th>
        <th>Reg No</th>
        <th>Date</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Slip</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const webAppURL = "https://script.google.com/macros/s/AKfycbyH7-DHzFTsY-iRDDkjRgJ5K6bSsArz8aiR5AdkStvKEDsFJCVhPGLqGpO6SwAktLUIDw/exec";
let allData = [];

async function fetchData(){
  try{
    const res = await fetch(webAppURL);
    allData = await res.json();
    renderTable();
  }catch(e){ console.error(e); }
}

function renderTable(){
  const tbody = document.querySelector("#adminTable tbody");
  tbody.innerHTML = '';
  let total = 0;

  allData.forEach(row=>{
    total += row.amount;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.name}</td>
      <td>${row.department}</td>
      <td>${row.regno}</td>
      <td>${row.date}</td>
      <td>Rs ${row.amount.toFixed(2)}</td>
      <td>${row.status}</td>
      <td>${row.slip ? `<a href="${row.slip}" target="_blank"><img src="${row.slip}"></a>` : ''}</td>
      <td><button class="delete-btn" onclick="deleteRow(${row.row})">Delete</button></td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById("totalAmount").innerText = total.toFixed(2);
}

async function deleteRow(row){
  if(!confirm("Are you sure you want to delete this entry?")) return;
  try{
    await fetch(webAppURL,{
      method:"POST",
      body: JSON.stringify({action:"delete", row: row})
    });
    fetchData();
  }catch(e){ console.error(e); }
}

// Refresh every 5 seconds
setInterval(fetchData, 5000);
fetchData();
</script>
</body>
</html>
